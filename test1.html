<!doctype html>
<meta charset="utf-8">
<pre id="out"></pre>
<script>
const out = document.getElementById("out");

function err(e) {
  return e ? { name: e.name || "Error", message: e.message || String(e) } : null;
}

function hex(buffer) {
  return [...new Uint8Array(buffer)].map(b => b.toString(16).padStart(2, "0")).join("");
}

async function sha256(text) {
  return hex(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text)));
}

async function getUAHints() {
  const r = {
    supported: !!navigator.userAgentData,
    mobile: null,
    platform: null,
    brands: null,
    highEntropy: null,
    error: null
  };
  try {
    if (!navigator.userAgentData) return r;
    r.mobile = navigator.userAgentData.mobile;
    r.platform = navigator.userAgentData.platform;
    r.brands = navigator.userAgentData.brands || null;
    if (navigator.userAgentData.getHighEntropyValues) {
      r.highEntropy = await navigator.userAgentData.getHighEntropyValues([
        "architecture",
        "bitness",
        "formFactors",
        "fullVersionList",
        "model",
        "platformVersion",
        "uaFullVersion",
        "wow64"
      ]);
    }
  } catch (e) {
    r.error = err(e);
  }
  return r;
}

function getNavigatorData() {
  return {
    userAgent: navigator.userAgent || null,
    vendor: navigator.vendor || null,
    deviceMemory: navigator.deviceMemory ?? null,
    languages: navigator.languages || null,
    pdfViewerEnabled: navigator.pdfViewerEnabled ?? null,
    webdriver: navigator.webdriver ?? null
  };
}

function getMonospaceSize() {
  const d = document.createElement("div");
  d.style.position = "absolute";
  d.style.left = "-9999px";
  d.style.visibility = "hidden";
  const s = document.createElement("span");
  s.textContent = "mmmmmmmmmmlliWWWWWW";
  s.style.fontFamily = "monospace";
  s.style.fontSize = "72px";
  d.appendChild(s);
  document.body.appendChild(d);
  const rect = s.getBoundingClientRect();
  document.body.removeChild(d);
  return { width: rect.width, height: rect.height };
}

function getFontCount() {
  const baseFonts = ["monospace", "sans-serif", "serif"];
  const testFonts = [
    "Arial", "Verdana", "Tahoma", "Trebuchet MS", "Times New Roman",
    "Georgia", "Garamond", "Courier New", "Brush Script MT",
    "Segoe UI", "Helvetica", "Roboto", "Noto Sans", "Noto Serif",
    "Calibri", "Cambria", "Consolas", "Candara", "Impact",
    "Comic Sans MS", "Palatino", "Monaco", "Menlo", "Ubuntu",
    "Inter", "SF Pro Text", "Apple SD Gothic Neo", "Malgun Gothic"
  ];
  const str = "mmmmmmmmmmlliWWWWWW1234567890";
  const size = "72px";
  const box = document.createElement("div");
  box.style.position = "absolute";
  box.style.left = "-9999px";
  box.style.visibility = "hidden";
  document.body.appendChild(box);

  const base = {};
  for (const b of baseFonts) {
    const s = document.createElement("span");
    s.textContent = str;
    s.style.fontSize = size;
    s.style.fontFamily = b;
    box.appendChild(s);
    base[b] = { w: s.offsetWidth, h: s.offsetHeight };
    box.removeChild(s);
  }

  const detected = [];
  for (const f of testFonts) {
    let ok = false;
    for (const b of baseFonts) {
      const s = document.createElement("span");
      s.textContent = str;
      s.style.fontSize = size;
      s.style.fontFamily = `'${f}', ${b}`;
      box.appendChild(s);
      if (s.offsetWidth !== base[b].w || s.offsetHeight !== base[b].h) ok = true;
      box.removeChild(s);
      if (ok) break;
    }
    if (ok) detected.push(f);
  }

  document.body.removeChild(box);
  return { estimatedCount: detected.length, detectedFonts: detected };
}

async function getCanvas() {
  try {
    const c = document.createElement("canvas");
    c.width = 300;
    c.height = 150;
    const x = c.getContext("2d");
    x.textBaseline = "top";
    x.font = "16px Arial";
    x.fillStyle = "#f60";
    x.fillRect(10, 10, 100, 40);
    x.fillStyle = "#069";
    x.fillText("fingerprint-test-한글-ABC-123", 20, 20);
    x.beginPath();
    x.arc(200, 75, 50, 0, Math.PI * 2, true);
    x.closePath();
    x.fillStyle = "rgba(120, 40, 200, 0.7)";
    x.fill();
    const dataUrl = c.toDataURL();
    return { width: c.width, height: c.height, hash: await sha256(dataUrl) };
  } catch (e) {
    return { error: err(e) };
  }
}

function getWebGL() {
  try {
    const c = document.createElement("canvas");
    const gl = c.getContext("webgl") || c.getContext("experimental-webgl") || c.getContext("webgl2");
    if (!gl) return { supported: false };
    const debug = gl.getExtension("WEBGL_debug_renderer_info");
    return {
      supported: true,
      version: gl.getParameter(gl.VERSION),
      shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
      vendor: debug ? gl.getParameter(debug.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
      renderer: debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER)
    };
  } catch (e) {
    return { supported: false, error: err(e) };
  }
}

async function getAudio() {
  try {
    const Ctx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    if (!Ctx) return { supported: false };
    const ctx = new Ctx(1, 44100, 44100);
    const osc = ctx.createOscillator();
    const comp = ctx.createDynamicsCompressor();
    osc.type = "triangle";
    osc.frequency.value = 10000;
    comp.threshold.value = -50;
    comp.knee.value = 40;
    comp.ratio.value = 12;
    comp.attack.value = 0;
    comp.release.value = 0.25;
    osc.connect(comp);
    comp.connect(ctx.destination);
    osc.start(0);
    const buf = await ctx.startRendering();
    const ch = buf.getChannelData(0);
    let sum = 0;
    for (let i = 0; i < ch.length; i++) sum += Math.abs(ch[i]);
    return {
      supported: true,
      length: buf.length,
      fingerprintValue: Number(sum.toFixed(8))
    };
  } catch (e) {
    return { supported: false, error: err(e) };
  }
}

async function collect() {
  return {
    collectedAt: new Date().toISOString(),
    navigator: getNavigatorData(),
    uaClientHints: await getUAHints(),
    fonts: getFontCount(),
    monospaceFontPx: getMonospaceSize(),
    canvas: await getCanvas(),
    webgl: getWebGL(),
    audioContext: await getAudio()
  };
}

(async () => {
  try {
    const data = await collect();
    out.textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    out.textContent = JSON.stringify({ error: err(e) }, null, 2);
  }
})();
</script>
