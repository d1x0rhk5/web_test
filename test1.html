<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>test2</title>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; color: #000; }
    pre {
      margin: 0;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
<pre id="out"></pre>
<script>
const REPORT_URL = "https://test.dlxorhks.xyz/collect.gif";
const out = document.getElementById("out");

function err(e) {
  return e ? { name: e.name || "Error", message: e.message || String(e) } : null;
}

function hex(buffer) {
  return [...new Uint8Array(buffer)].map(b => b.toString(16).padStart(2, "0")).join("");
}

async function sha256(value) {
  const text = typeof value === "string" ? value : JSON.stringify(value);
  return hex(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text)));
}

function getScreenViewportBundle() {
  const vv = window.visualViewport;
  return {
    screen: {
      width: window.screen?.width ?? null,
      height: window.screen?.height ?? null,
      availWidth: window.screen?.availWidth ?? null,
      availHeight: window.screen?.availHeight ?? null,
      colorDepth: window.screen?.colorDepth ?? null,
      pixelDepth: window.screen?.pixelDepth ?? null,
      orientationType: window.screen?.orientation?.type ?? null,
      orientationAngle: window.screen?.orientation?.angle ?? null
    },
    window: {
      innerWidth: window.innerWidth ?? null,
      innerHeight: window.innerHeight ?? null,
      outerWidth: window.outerWidth ?? null,
      outerHeight: window.outerHeight ?? null,
      devicePixelRatio: window.devicePixelRatio ?? null
    },
    visualViewport: vv ? {
      width: vv.width ?? null,
      height: vv.height ?? null,
      scale: vv.scale ?? null,
      offsetLeft: vv.offsetLeft ?? null,
      offsetTop: vv.offsetTop ?? null,
      pageLeft: vv.pageLeft ?? null,
      pageTop: vv.pageTop ?? null
    } : null
  };
}

function getIntlLocaleTimezoneBundle() {
  try {
    const ro = Intl.DateTimeFormat().resolvedOptions();
    return {
      locale: ro.locale || null,
      calendar: ro.calendar || null,
      numberingSystem: ro.numberingSystem || null,
      hourCycle: ro.hourCycle || null,
      timeZone: ro.timeZone || null
    };
  } catch (e) {
    return { error: err(e) };
  }
}

async function getMediaDevicesTopology() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
      return {
        supported: false,
        secureContext: window.isSecureContext,
        counts: null,
        totalDevices: null,
        topologyHash: null
      };
    }

    const devices = await navigator.mediaDevices.enumerateDevices();
    const counts = { audioinput: 0, videoinput: 0, audiooutput: 0, other: 0 };
    const simplified = devices.map((d) => {
      if (d.kind in counts) counts[d.kind] += 1;
      else counts.other += 1;
      return {
        kind: d.kind,
        label: d.label || "",
        deviceId: d.deviceId || "",
        groupId: d.groupId || ""
      };
    });

    const labeledDeviceCount = devices.filter((d) => !!d.label).length;
    const uniqueGroups = new Set(devices.map((d) => d.groupId).filter(Boolean)).size;

    return {
      supported: true,
      secureContext: window.isSecureContext,
      counts,
      totalDevices: devices.length,
      labeledDeviceCount,
      uniqueGroups,
      topologyHash: await sha256(simplified)
    };
  } catch (e) {
    return {
      supported: false,
      secureContext: window.isSecureContext,
      error: err(e)
    };
  }
}

async function getWebGPUAdapterInfo() {
  try {
    if (!navigator.gpu || !navigator.gpu.requestAdapter) {
      return {
        supported: false,
        secureContext: window.isSecureContext,
        adapter: null
      };
    }

    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) {
      return {
        supported: false,
        secureContext: window.isSecureContext,
        adapter: null
      };
    }

    let info = null;
    try {
      if (adapter.info) {
        info = {
          vendor: adapter.info.vendor || "",
          architecture: adapter.info.architecture || "",
          device: adapter.info.device || "",
          description: adapter.info.description || ""
        };
      }
    } catch (e) {
      info = { error: err(e) };
    }

    let features = [];
    try {
      features = [...adapter.features.values()].sort();
    } catch (_) {}

    let limits = {};
    try {
      for (const k in adapter.limits) {
        if (typeof adapter.limits[k] !== "function") limits[k] = adapter.limits[k];
      }
    } catch (_) {}

    let isFallbackAdapter = null;
    try {
      isFallbackAdapter = adapter.isFallbackAdapter ?? null;
    } catch (_) {}

    return {
      supported: true,
      secureContext: window.isSecureContext,
      isFallbackAdapter,
      info,
      featureCount: features.length,
      featuresHash: await sha256(features),
      limitsHash: await sha256(limits),
      adapterHash: await sha256({ info, features, limits, isFallbackAdapter })
    };
  } catch (e) {
    return {
      supported: false,
      secureContext: window.isSecureContext,
      error: err(e)
    };
  }
}

async function collect() {
  return {
    collectedAt: new Date().toISOString(),
    screenViewportBundle: getScreenViewportBundle(),
    intlLocaleTimezoneBundle: getIntlLocaleTimezoneBundle(),
    mediaDevicesTopology: await getMediaDevicesTopology(),
    webgpuAdapterInfo: await getWebGPUAdapterInfo()
  };
}

function toBase64UrlUtf8(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    bin += String.fromCharCode(...bytes.subarray(i, i + chunk));
  }
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
}

function sendByGet(data) {
  const json = JSON.stringify(data);
  const encoded = toBase64UrlUtf8(json);
  const url = REPORT_URL + "?d=" + encodeURIComponent(encoded) + "&t=" + Date.now();

  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve({ ok: true, endpoint: REPORT_URL, encodedLength: encoded.length });
    img.onerror = () => resolve({ ok: false, endpoint: REPORT_URL, encodedLength: encoded.length });
    img.src = url;
  });
}

(async () => {
  try {
    const data = await collect();
    out.textContent = JSON.stringify(data, null, 2);
    await sendByGet(data);
  } catch (e) {
    out.textContent = JSON.stringify({ error: err(e) }, null, 2);
  }
})();
</script>
</body>
</html>
